<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SFBBO Volunteer Opportunities</title>
    <meta
      name="description"
      content="A simple logo-first catalog of SFBBO volunteering opportunities."
    />
    <meta name="theme-color" content="#1f5c50" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <img class="hero-logo" src="SFBBO_Logo_Rounded.png" alt="San Francisco Bay Bird Observatory logo" />
        <h1>Volunteer opportunities</h1>
      </section>

      <section class="catalog-section" aria-labelledby="catalog-heading">
        <div class="section-heading">
          <p class="eyebrow">Available opportunities</p>
        </div>
        <div class="opportunity-grid" id="opportunity-grid" aria-live="polite"></div>
      </section>

    </main>

    <script src="program-data.js"></script>
    <script src="app.js"></script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js')}</script>
  </body>
</html>
